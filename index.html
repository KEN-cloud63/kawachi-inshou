<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>河内印章 出荷日管理</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans",sans-serif;background:#f5f5f4;color:#1a1a1a;min-height:100vh;padding:1.5rem;}
@media (max-width:600px){
  body{padding:1rem;}
  .container{max-width:100%;}
  .header .logo{height:48px;}
  .header .subtitle{font-size:18px;}
  .header{padding-top:32px;}
  .badge{top:0;}
  .card{padding:1.25rem 1rem;}
  .gen-btn{width:100%;}
  .row{grid-template-columns:24px 1fr 80px;gap:10px;padding:14px 0;}
  .row-num{font-size:14px;}
  .date-input,.stock-input{font-size:16px;padding:8px 10px;}
}
.container{max-width:560px;margin:0 auto;}
.header{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:2rem;position:relative;}
.header .logo{height:56px;width:auto;object-fit:contain;}
.header .subtitle{font-size:20px;font-weight:500;color:#1a1a1a;letter-spacing:0.05em;}
.badge{position:absolute;right:0;top:8px;font-size:13px;padding:3px 10px;border-radius:20px;background:#dcfce7;color:#166534;}
.badge i{font-size:14px;vertical-align:-1px;margin-right:3px;}
.card{background:#fff;border:0.5px solid rgba(0,0,0,0.12);border-radius:12px;padding:1.5rem 1.75rem;margin-bottom:1rem;}
.card-title{font-size:16px;font-weight:500;color:#666;margin-bottom:1.25rem;display:flex;align-items:center;gap:6px;}
.note{font-size:13px;color:#999;font-weight:400;}
.row{display:grid;grid-template-columns:32px 1fr 100px;align-items:center;gap:14px;padding:18px 0;border-bottom:0.5px solid rgba(0,0,0,0.08);}
.row:last-of-type{border-bottom:none;}
.row-head{padding:0 0 12px;border-bottom:0.5px solid rgba(0,0,0,0.12);margin-bottom:4px;}
.row-head span{font-size:13px;color:#999;}
.row-head span:nth-child(1){text-align:center;}
.row-head span:nth-child(3){text-align:center;}
.row-num{font-size:16px;color:#999;text-align:center;}
.date-input,.stock-input,.text-input{font-size:18px;padding:10px 14px;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;background:#fff;color:#1a1a1a;font-family:inherit;}
.date-input::placeholder{color:#bbb;font-size:16px;}
.date-input{width:100%;}
.stock-input{width:100%;text-align:center;}
.collapse-header{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
.collapse-header .card-title{margin-bottom:0;}
.chevron{font-size:20px;color:#999;transition:transform 0.2s;}
.collapsed .chevron{transform:rotate(-90deg);}
.collapse-body{margin-top:1rem;}
.collapsed .collapse-body{display:none;}
.upload-area{border:0.5px dashed rgba(0,0,0,0.2);border-radius:8px;padding:1.5rem;text-align:center;color:#666;font-size:15px;background:#fafaf9;cursor:pointer;transition:background 0.15s;}
.upload-area:hover,.upload-area.dragover{background:#f0f0ef;}
.upload-area i{font-size:32px;color:#999;display:block;margin-bottom:8px;}
.upload-area .file-info{font-size:14px;color:#999;margin-top:6px;}
.upload-btn{margin-top:10px;display:inline-flex;align-items:center;gap:6px;font-size:15px;padding:6px 14px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.2);background:#fff;color:#1a1a1a;cursor:pointer;}
.upload-btn:hover{background:#fafaf9;}
.info-line{margin-top:10px;font-size:14px;color:#999;display:flex;align-items:center;gap:6px;}
.info-line i{font-size:16px;}
.gen-btn-wrap{display:flex;justify-content:center;}
.gen-btn{width:60%;min-width:220px;padding:13px;font-size:18px;font-weight:500;border-radius:12px;border:none;background:#dc2626;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.gen-btn:hover{background:#b91c1c;}
.gen-btn:disabled{background:#9ca3af;cursor:not-allowed;}
.gen-btn i{font-size:20px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:8px;font-size:15px;opacity:0;transition:opacity 0.2s;pointer-events:none;z-index:100;}
.toast.show{opacity:1;}
.toast.error{background:#dc2626;}
.toast.success{background:#16a34a;}
.warning{background:#fef3c7;border:0.5px solid #fde68a;color:#92400e;font-size:14px;padding:10px 14px;border-radius:8px;margin-top:10px;display:flex;gap:8px;align-items:flex-start;}
.warning i{font-size:18px;flex-shrink:0;margin-top:1px;}
</style>
</head>

const PRODUCT_ORDER = [];
for(const [code, price, attrs] of window.PRODUCTS_DATA) {
  PRODUCTS[code] = { price, attrs };
  PRODUCT_ORDER.push(code);
}

function getDefaultDates() {
  const today = new Date();
  const dates = [];
  let d = new Date(today.getFullYear(), today.getMonth(), today.getDate() + 5);
  while(dates.length < 5) {
    if(d.getDay() !== 0 && d.getDay() !== 6) {
      dates.push(new Date(d));
    }
    d.setDate(d.getDate() + 1);
  }
  return dates;
}

function loadState() {
  const saved = localStorage.getItem('shippingState');
  if(saved) {
    try { const s = JSON.parse(saved); if(s.length === 5) return s; } catch(e) {}
  }
  return [
    { date: '', stock: 20 },
    { date: '', stock: 20 },
    { date: '', stock: 20 },
    { date: '', stock: 20 },
    { date: '', stock: 20 }
  ];
}

function saveState() {
  localStorage.setItem('shippingState', JSON.stringify(state));
}

let state = loadState();

function renderRows() {
  const html = state.map((row, i) => `
    <div class="row">
      <span class="row-num">${i+1}</span>
      <input class="date-input" type="${row.date ? 'date' : 'text'}" value="${row.date}" placeholder="日付を選択してください" onfocus="this.type='date'" onblur="if(!this.value)this.type='text'" onchange="updateDate(${i}, this.value)">
      <input class="stock-input" type="number" value="${row.stock}" min="0" onchange="updateStock(${i}, this.value)">
    </div>
  `).join('');
  document.getElementById('dateRows').innerHTML = html;
}

function updateDate(i, val) {
  state[i].date = val;
  saveState();
}

function updateStock(i, val) {
  state[i].stock = parseInt(val) || 0;
  saveState();
}

function togglePriceCard() {
  document.getElementById('priceCard').classList.toggle('collapsed');
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast ' + type, 2500);
}

function dateToSku(dateStr) {
  const [y, m, d] = dateStr.split('-');
  return y.slice(-2) + m + d;
}

function dateToLabel(dateStr) {
  const [y, m, d] = dateStr.split('-');
  return `${parseInt(m)}月${parseInt(d)}日出荷希望`;
}

function dateToStopName(dateStr) {
  const [y, m, d] = dateStr.split('-');
  return `${parseInt(m)}月${parseInt(d)}日出荷停止`;
}

function csvEscape(v) {
  if(v === null || v === undefined) return '';
  const s = String(v);
  if(s.includes(',') || s.includes('"') || s.includes('\n')) {
    return '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
}

function buildCsv(stopDate) {
  const headers = ['商品管理番号（商品URL）','バリエーション項目キー定義','バリエーション項目名定義','バリエーション1選択肢定義','SKU管理番号','バリエーション項目キー1','バリエーション項目選択肢1','販売価格','在庫数','カタログIDなしの理由','商品属性（項目）1','商品属性（値）1','商品属性（項目）2','商品属性（値）2','商品属性（項目）3','商品属性（値）3','商品属性（項目）4','商品属性（値）4','商品属性（項目）5','商品属性（値）5','在庫あり時納期管理番号','在庫切れ時納期管理番号'];
  const labels = state.map(s => dateToLabel(s.date));
  const varChoices = labels.join('|');
  const rows = [headers];
  for(const code of PRODUCT_ORDER) {
    const p = PRODUCTS[code];
    const headerRow = [code, 'ご希望の出荷日をお選びください', 'ご希望の出荷日をお選びください', varChoices, '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', ''];
    rows.push(headerRow);
    for(const s of state) {
      const label = dateToLabel(s.date);
      const stock = (stopDate === s.date) ? 0 : s.stock;
      const skuRow = [code, '', '', '', dateToSku(s.date), 'ご希望の出荷日をお選びください', label, p.price, stock, '5', ...p.attrs];
      rows.push(skuRow);
    }
  }
  return rows.map(r => r.map(csvEscape).join(',')).join('\r\n') + '\r\n';
}

async function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function loadEncoding() {
  if(window.Encoding) return;
  await loadScript('https://cdn.jsdelivr.net/npm/encoding-japanese@2.0.0/encoding.min.js');
}

async function loadJSZip() {
  if(window.JSZip) return;
  await loadScript('https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js');
}

// スマホ・タブレット判定
function isMobile() {
  return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
    || !('showDirectoryPicker' in window);
}

async function toShiftJIS(str) {
  await loadEncoding();
  const unicodeArray = window.Encoding.stringToCode(str);
  const sjisArray = window.Encoding.convert(unicodeArray, { to: 'SJIS', from: 'UNICODE' });
  return new Uint8Array(sjisArray);
}

async function saveFile(filename, content, dirHandle) {
  const sjisBytes = await toShiftJIS(content);
  const blob = new Blob([sjisBytes], { type: 'text/csv' });
  if(dirHandle) {
    const fileHandle = await dirHandle.getFileHandle(filename, { create: true });
    const writable = await fileHandle.createWritable();
    await writable.write(blob);
    await writable.close();
  } else {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }
}

async function generateAll() {
  // 日付チェック
  const emptyDates = state.filter(s => !s.date);
  if(emptyDates.length > 0) {
    showToast('すべての日付を入力してください', 'error');
    return;
  }
  const btn = document.querySelector('.gen-btn');
  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader-2"></i>生成中...';
  try {
    if(isMobile()) {
      // スマホ・タブレット → ZIP一括ダウンロード
      await generateZip();
    } else {
      // PC（Chrome/Edge） → フォルダ選択して個別保存
      await generateToFolder();
    }
  } catch(e) {
    console.error(e);
    showToast('エラー: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-refresh"></i>データを作成';
  }
}

async function generateToFolder() {
  let dirHandle = null;
  try {
    dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
  } catch(e) {
    if(e.name === 'AbortError') return;
    throw e;
  }
  const baseCsv = buildCsv(null);
  await saveFile('normal-item.csv', baseCsv, dirHandle);
  for(const s of state) {
    const stopCsv = buildCsv(s.date);
    const filename = `normal-item_${dateToStopName(s.date)}.csv`;
    await saveFile(filename, stopCsv, dirHandle);
  }
  showToast('6個のCSVを作成しました', 'success');
}

async function generateZip() {
  await loadJSZip();
  const zip = new window.JSZip();

  // 通常版
  const baseCsv = buildCsv(null);
  const baseBytes = await toShiftJIS(baseCsv);
  zip.file('normal-item.csv', baseBytes);

  // 出荷停止版
  for(const s of state) {
    const stopCsv = buildCsv(s.date);
    const stopBytes = await toShiftJIS(stopCsv);
    const filename = `normal-item_${dateToStopName(s.date)}.csv`;
    zip.file(filename, stopBytes);
  }

  // ZIPファイル名: 今月の月を取得
  const firstDate = state[0].date.split('-');
  const zipName = `normal-item_${parseInt(firstDate[1])}月.zip`;

  const blob = await zip.generateAsync({ type: 'blob' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = zipName;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  showToast(`${zipName} をダウンロードしました`, 'success');
}

const uploadArea = document.getElementById('uploadArea');
const priceFile = document.getElementById('priceFile');

uploadArea.addEventListener('click', () => priceFile.click());
uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', async e => {
  e.preventDefault();
  uploadArea.classList.remove('dragover');
  if(e.dataTransfer.files.length > 0) {
    await handlePriceFile(e.dataTransfer.files[0]);
  }
});
priceFile.addEventListener('change', async e => {
  if(e.target.files.length > 0) {
    await handlePriceFile(e.target.files[0]);
  }
});

async function handlePriceFile(file) {
  try {
    await loadEncoding();
    const buf = await file.arrayBuffer();
    const bytes = new Uint8Array(buf);
    const text = window.Encoding.convert(bytes, { to: 'UNICODE', from: 'SJIS', type: 'string' });
    const lines = text.split(/\r?\n/);
    let updated = 0;
    for(let i = 1; i < lines.length; i++) {
      const line = lines[i].trim();
      if(!line) continue;
      const cells = line.split(',');
      const code = cells[0]?.trim();
      const price = cells[1]?.trim();
      if(code && price && PRODUCTS[code]) {
        PRODUCTS[code].price = price;
        updated++;
      }
    }
    localStorage.setItem('customPrices', JSON.stringify(
      Object.fromEntries(Object.entries(PRODUCTS).map(([k, v]) => [k, v.price]))
    ));
    document.getElementById('priceInfo').textContent = `価格データ更新済み: ${updated}商品（${file.name}）`;
    showToast(`${updated}商品の価格を更新しました`, 'success');
  } catch(e) {
    console.error(e);
    showToast('CSVの読み込みに失敗しました', 'error');
  }
}

const savedPrices = localStorage.getItem('customPrices');
if(savedPrices) {
  try {
    const prices = JSON.parse(savedPrices);
    for(const [code, price] of Object.entries(prices)) {
      if(PRODUCTS[code]) PRODUCTS[code].price = price;
    }
  } catch(e) {}
}

renderRows();

// モード判定して表示を切り替え
if(isMobile()) {
  document.getElementById('modeInfoText').textContent = 'スマホ: ZIPファイルでまとめてダウンロード';
}
</script>
